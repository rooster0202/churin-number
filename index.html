<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="駐輪番号">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>駐輪番号</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/icon.svg">
    <link rel="stylesheet" href="./styles.css?v=20260531-odakyu-blue">
  </head>
  <body>
    <main class="app-shell">
      <section class="panel" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <h1 id="app-title">駐輪番号</h1>
          </div>
        </header>

        <div class="number-stage" id="numberStage">
          <p class="status" id="statusText">番号を入力してください</p>
          <output class="display-number" id="displayNumber" aria-live="polite">----</output>
          <p class="saved-at" id="savedAt">保存された番号はありません</p>
        </div>

        <form class="entry" id="entryForm">
          <label class="sr-only" for="spotInput">駐輪番号</label>
          <input
            id="spotInput"
            class="spot-input"
            inputmode="numeric"
            autocomplete="off"
            pattern="[0-9]*"
            maxlength="4"
            placeholder="0000"
            aria-label="駐輪番号"
          >
          <button class="primary-button" id="saveButton" type="submit">保存</button>
        </form>

        <div class="keypad" aria-label="数字入力">
          <button type="button" data-digit="1">1</button>
          <button type="button" data-digit="2">2</button>
          <button type="button" data-digit="3">3</button>
          <button type="button" data-digit="4">4</button>
          <button type="button" data-digit="5">5</button>
          <button type="button" data-digit="6">6</button>
          <button type="button" data-digit="7">7</button>
          <button type="button" data-digit="8">8</button>
          <button type="button" data-digit="9">9</button>
          <button type="button" id="deleteButton" aria-label="1桁削除">⌫</button>
          <button type="button" data-digit="0">0</button>
          <button type="button" id="clearInputButton" aria-label="入力をクリア">C</button>
        </div>

        <footer class="actions">
          <button class="secondary-button" id="editButton" type="button">修正</button>
          <button class="done-button" id="doneButton" type="button">精算完了</button>
        </footer>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
  </body>
</html>
